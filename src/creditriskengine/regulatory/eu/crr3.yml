# EU CRR3 - Capital Requirements Regulation III
# Regulation (EU) 2024/1623 implementing Basel III final reforms in the EU

jurisdiction: EU
regulator: European Banking Authority (EBA)
framework: CRR3 / CRD6
effective_date: "2025-01-01"
document_reference: Regulation (EU) 2024/1623

credit_risk:
  approaches_permitted: [SA, FIRB, AIRB]
  standardised_approach:
    risk_weights:
      sovereigns:
        aaa_to_aa_minus: 0.0
        a_plus_to_a_minus: 0.20
        bbb_plus_to_bbb_minus: 0.50
        bb_plus_to_b_minus: 1.00
        below_b_minus: 1.50
        unrated: 1.00
        eu_member_state_domestic_currency: 0.0  # EU sovereign exemption
      banks:
        grade_a: 0.20
        grade_b: 0.30
        grade_c: 0.50
        grade_d: 1.00
        grade_e: 1.50
      corporates:
        aaa_to_aa_minus: 0.20
        a_plus_to_a_minus: 0.50
        bbb_plus_to_bbb_minus: 0.75
        bb_plus_to_b_minus: 1.00
        below_b_minus: 1.50
        unrated: 1.00
        sme_supporting_factor_eligible: true
      retail:
        regulatory_retail: 0.75
        residential_mortgage_lte_80: 0.20
        residential_mortgage_gt_80_lte_90: 0.25
        residential_mortgage_gt_90_lte_100: 0.30
      sme:
        sme_supporting_factor_threshold_eur: 2500000
        sme_supporting_factor_below: 0.7619
        sme_supporting_factor_above: 0.85
        infrastructure_supporting_factor: 0.75
  irb_approach:
    pd_floor_bps: 5
    lgd_floors:
      senior_unsecured: 0.25
      subordinated: 0.50
    lgd_supervisory:
      senior_unsecured: 0.45
      subordinated: 0.75
      secured_financial_collateral: 0.0
      secured_receivables: 0.20
      secured_commercial_real_estate: 0.20
      secured_residential_real_estate: 0.20
      secured_other_collateral: 0.25
    maturity_default_years: 2.5
    maturity_min_years: 1.0
    maturity_max_years: 5.0
    asset_correlation:
      corporate:
        rho_min: 0.12
        rho_max: 0.24
      retail_mortgage:
        rho: 0.15
      retail_revolving:
        rho: 0.04
      retail_other:
        rho_min: 0.03
        rho_max: 0.16
    scaling_factor: 1.06
    airb_restrictions:
      - large_corporates_revenue_above_500m_eur
      - financial_institutions
    firb_restrictions:
      - equity_exposures

output_floor:
  enabled: true
  final_pct: 0.725
  phase_in_start: "2025-01-01"
  transitional_provisions: true
  phase_in:
    "2025-01-01": 0.50
    "2026-01-01": 0.55
    "2027-01-01": 0.60
    "2028-01-01": 0.65
    "2029-01-01": 0.70
    "2030-01-01": 0.725
  eu_specific:
    unrealised_gains_filter: true
    parallel_stack_approach: false
    distribution_restrictions_at_breach: true

default_definition:
  dpd_threshold: 90
  unlikeliness_to_pay: true
  materiality_threshold_absolute_eur: 100
  materiality_threshold_relative: 0.01
  cure_period_months: 3
  technical_default_exclusion: true

capital_requirements:
  minimum_cet1_pct: 0.045
  minimum_tier1_pct: 0.06
  minimum_total_capital_pct: 0.08
  capital_conservation_buffer_pct: 0.025
  countercyclical_buffer_range:
    min: 0.0
    max: 0.025
  gsib_surcharge_range:
    min: 0.01
    max: 0.035
  systemic_risk_buffer:
    enabled: true
    max_pct: 0.05
  pillar2_requirement:
    set_by: National Competent Authority (NCA)
    srep_driven: true

leverage_ratio:
  minimum_pct: 0.03
  gsib_buffer: true
  gsib_buffer_pct: 0.50

cva_risk:
  approaches: [BA-CVA, SA-CVA]
  exemptions:
    - sovereigns
    - central_banks
    - multilateral_development_banks
    - intragroup_transactions
    - pension_funds  # transitional exemption

reporting:
  corep_templates: true
  frequency: quarterly
  remittance_ssd: 42  # calendar days after reference date
  disclosure_pillar3: semi_annual
