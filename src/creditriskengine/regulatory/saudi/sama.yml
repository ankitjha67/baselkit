# Saudi Arabia SAMA - Saudi Central Bank
jurisdiction: saudi_arabia
regulator: Saudi Central Bank (SAMA)
framework: Basel III (SAMA Prudential Rules)
effective_date: "2023-01-01"

credit_risk:
  approaches_permitted: [SA, FIRB]
  pd_floor_bps: 3
  lgd_supervisory:
    senior_unsecured: 0.45
    subordinated: 0.75
  maturity_default_years: 2.5

output_floor:
  enabled: true
  final_pct: 0.725
  phase_in_start: "2023-01-01"

default_definition:
  dpd_threshold: 90
  materiality_threshold_absolute_sar: 1000

capital_requirements:
  minimum_cet1_pct: 0.07
  minimum_tier1_pct: 0.085
  minimum_total_capital_pct: 0.105
  capital_conservation_buffer_pct: 0.025

leverage_ratio:
  minimum_pct: 0.03

reporting:
  frequency: quarterly
  currency: SAR
