# India RBI - Reserve Bank of India
# Basel III implementation under RBI master circulars

jurisdiction: India
regulator: Reserve Bank of India (RBI)
framework: Basel III (RBI adaptation)
effective_date: "2025-04-01"
document_reference: RBI Master Circular on Basel III Capital Regulations

credit_risk:
  approaches_permitted: [SA, FIRB]
  note: "A-IRB not permitted by RBI; banks must use SA or F-IRB with approval"
  standardised_approach:
    risk_weights:
      sovereigns:
        indian_government_inr: 0.0
        indian_state_government: 0.20
        aaa_to_aa_minus: 0.0
        a_plus_to_a_minus: 0.20
        bbb_plus_to_bbb_minus: 0.50
        bb_plus_to_b_minus: 1.00
        below_b_minus: 1.50
        unrated: 1.00
      banks:
        scheduled_commercial_banks:
          aaa_to_aa_minus: 0.20
          a_plus_to_a_minus: 0.30
          bbb_plus_to_bbb_minus: 0.50
          bb_plus_to_b_minus: 1.00
          below_b_minus: 1.50
          unrated: 0.50
      corporates:
        aaa: 0.20
        aa: 0.30
        a: 0.50
        bbb: 1.00
        below_bbb: 1.50
        unrated: 1.00
      retail:
        regulatory_retail: 0.75
        residential_mortgage_lte_80: 0.35
        residential_mortgage_gt_80: 0.50
        priority_sector_housing:
          upto_30_lakh_inr: 0.35
          above_30_lakh_upto_75_lakh_inr: 0.35
          above_75_lakh_inr: 0.50
      personal_loans:
        consumer_credit: 1.25  # RBI Master Circular — 125% risk weight for personal loans
        credit_card_receivables: 1.25  # Consumer credit category
        note: "Higher RW per RBI for unsecured consumer lending"
      commercial_real_estate:
        cre_general: 1.00
        cre_residential_housing: 0.75
      nbfc:
        aaa: 0.20
        aa: 0.30
        a: 0.50
        bbb: 1.00
        below_bbb: 1.50
        unrated: 1.00
  irb_approach:
    pd_floor_bps: 3
    lgd_supervisory:
      senior_unsecured: 0.45
      subordinated: 0.75
    maturity_default_years: 2.5
    note: "Only F-IRB permitted; limited to select large banks with RBI approval"

output_floor:
  enabled: true
  final_pct: 0.80
  note: "RBI has adopted a higher output floor of 80% vs BCBS 72.5%"
  phase_in:
    "2025-04-01": 0.55
    "2026-04-01": 0.60
    "2027-04-01": 0.65
    "2028-04-01": 0.70
    "2029-04-01": 0.75
    "2030-04-01": 0.80

default_definition:
  dpd_threshold: 90
  unlikeliness_to_pay: true
  materiality_threshold_absolute_inr: 50000  # INR 50,000
  materiality_threshold_relative: 0.01
  npa_classification:
    substandard: "up to 12 months"
    doubtful: "12 to 36 months"
    loss: "above 36 months or uncollectable"
  agricultural_loans_dpd: 90
  note: "NPA classification aligned at 90 DPD for all loan categories"

capital_requirements:
  minimum_cet1_pct: 0.055  # RBI higher than BCBS
  minimum_tier1_pct: 0.07
  minimum_total_capital_pct: 0.09
  capital_conservation_buffer_pct: 0.025
  countercyclical_buffer_pct: 0.0  # currently 0%
  dsib_surcharge:
    enabled: true
    buckets:
      bucket_1: 0.002
      bucket_2: 0.004
      bucket_3: 0.006
      bucket_4: 0.008
      bucket_5: 0.01

leverage_ratio:
  minimum_pct: 0.04
  note: "RBI requires 4% vs BCBS 3%"

cva_risk:
  approaches: [BA-CVA]
  note: "Simplified approach given limited derivatives market depth"

reporting:
  frequency: quarterly
  currency: INR
  fiscal_year_start: "April"
  rbi_returns:
    - DSB Return
    - ALM Returns
    - Basel III Monitoring

# ============================================================================
# RBI ECL Master Direction 2026 (RBI/2026-27/34)
# Reserve Bank of India (Commercial Banks - Asset Classification,
# Provisioning and Income Recognition) Directions, April 27, 2026.
# Effective: April 1, 2027.
# ============================================================================
ecl_master_direction_2026:
  reference: "RBI/2026-27/34"
  document: "Master Direction on Asset Classification, Provisioning and Income Recognition"
  issued_date: "2026-04-27"
  effective_date: "2027-04-01"
  scope: "Commercial banks (excl. SFBs, payments banks, LABs), SBI"

  pd_lgd_floors:
    # Paragraph 96
    pd_floor: 0.0003
    # Paragraph 97
    lgd_backstop_secured: 0.65
    lgd_backstop_unsecured: 0.70
    # Paragraph 98
    lgd_eligible_collateral: 0.30
    eligible_collateral_types:
      - cash
      - gold
      - government_securities
      - lic_policy
      - kvp
      - nsc

  sicr:
    # Paragraph 33
    dpd_backstop: 30
    revolving_overlimit_days: 60
    rebuttable: true

  eir:
    # Paragraph 21
    mandatory_from: "2027-04-01"
    legacy_migration_deadline: "2030-03-31"

  transition:
    effective_date: "2027-04-01"
    fair_valuation_date: "2027-04-01"
    # Paragraph 108: capital add-back phase-in
    capital_add_back_phase_in:
      "2028": 0.80  # FY 2027-28: 4/5
      "2029": 0.60  # FY 2028-29: 3/5
      "2030": 0.40  # FY 2029-30: 2/5
      "2031": 0.20  # FY 2030-31: 1/5

  collateral_revaluation:
    # Paragraph 55
    stage3_threshold_inr_crore: 7.5
    stage3_revaluation_years: 2
    stock_revaluation_years: 1

  governance:
    # Paragraphs 56-57
    board_oversight_required: true
    committee_includes: [CFO, CRO]
    model_risk_management_tiers: 3
    independent_validation: true

  project_finance_dcco:
    # Paragraph 82(4) Note 1
    infrastructure_quarterly_rate: 0.00375
    non_infrastructure_quarterly_rate: 0.005625

  borrower_level_classification:
    # Paragraphs 8(9), 76
    stage_3_contagion: true
    stage_2_facility_level: true

  # Stage 1 and Stage 2 provisioning floors per Paragraph 82
  provisioning_floors:
    secured_retail:        { stage_1: 0.0040, stage_2: 0.05 }
    corporate:             { stage_1: 0.0040, stage_2: 0.05 }
    small_micro_enterprise: { stage_1: 0.0025, stage_2: 0.05 }
    medium_enterprise:     { stage_1: 0.0040, stage_2: 0.05 }
    farm_credit_agricultural: { stage_1: 0.0025, stage_2: 0.05 }
    banks_nbfcs_regulated_fis: { stage_1: 0.0040, stage_2: 0.05 }
    loans_against_deposits_lic_kvp: { stage_1: 0.0040, stage_2: 0.0040 }
    gold_loans:            { stage_1: 0.0040, stage_2: 0.015 }
    state_govt_guaranteed: { stage_1: 0.0040, stage_2: 0.025 }
    unsecured_retail:      { stage_1: 0.01,   stage_2: 0.05 }
    housing_loans_individuals: { stage_1: 0.0025, stage_2: 0.015 }
    cre_adc_150:           { stage_1: 0.0125, stage_2: 0.05 }
    cre_rh_adc:            { stage_1: 0.01,   stage_2: 0.05 }
    other_residential_re:  { stage_1: 0.0040, stage_2: 0.015 }
    other_commercial_re:   { stage_1: 0.0040, stage_2: 0.025 }
    project_finance_pre_operational: { stage_1: 0.01, stage_2: 0.05 }
    project_finance_operational: { stage_1: 0.0040, stage_2: 0.05 }
    central_govt_guaranteed: { stage_1: 0.0025, stage_2: 0.0025 }
    natural_calamity_restructured: { stage_1: 0.05, stage_2: 0.10 }
    other:                 { stage_1: 0.0040, stage_2: 0.05 }

  stage_3_floors:
    standard:
      # Paragraph 82(1)
      bracket_0_1y:  { secured: 0.25, unsecured: 0.25 }
      bracket_1_2y:  { secured: 0.40, unsecured: 1.00 }
      bracket_2_3y:  { secured: 0.55, unsecured: 1.00 }
      bracket_3_4y:  { secured: 0.75, unsecured: 1.00 }
      bracket_4_plus: { secured: 1.00, unsecured: 1.00 }
    deposits_gold_state:
      # Paragraph 82(2) - lower floors for deposits/LIC/gold/state govt
      bracket_0_1y:  { secured: 0.10, unsecured: 0.25 }
      bracket_1_2y:  { secured: 0.20, unsecured: 1.00 }
      bracket_2_3y:  { secured: 0.30, unsecured: 1.00 }
      bracket_3_4y:  { secured: 0.40, unsecured: 1.00 }
      bracket_4_plus: { secured: 1.00, unsecured: 1.00 }
    unsecured_retail:
      # Paragraph 82(3)
      bracket_0_1y:  0.25
      bracket_1_plus: 1.00
    housing_residential_re:
      # Paragraph 82(4)
      bracket_0_1y:  { secured: 0.10, unsecured: 0.25 }
      bracket_1_2y:  { secured: 0.20, unsecured: 1.00 }
      bracket_2_3y:  { secured: 0.30, unsecured: 1.00 }
      bracket_3_4y:  { secured: 0.40, unsecured: 1.00 }
      bracket_4_plus: { secured: 1.00, unsecured: 1.00 }
