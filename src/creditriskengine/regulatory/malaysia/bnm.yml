# Malaysia BNM - Bank Negara Malaysia
# Basel III implementation under BNM Capital Adequacy Framework

jurisdiction: Malaysia
regulator: Bank Negara Malaysia (BNM)
framework: Basel III (BNM Capital Adequacy Framework)
effective_date: "2025-01-01"
document_reference: BNM Capital Adequacy Framework (Capital Components), revised 2024

credit_risk:
  approaches_permitted: [SA, FIRB, AIRB]
  note: "IRB approaches require BNM approval; applies to both conventional and Islamic banks"
  standardised_approach:
    risk_weights:
      sovereigns:
        aaa_to_aa_minus: 0.0
        a_plus_to_a_minus: 0.20
        bbb_plus_to_bbb_minus: 0.50
        bb_plus_to_b_minus: 1.00
        below_b_minus: 1.50
        unrated: 1.00
        malaysia_government_myr: 0.0
        bnm_myr: 0.0
      banks:
        grade_a: 0.20
        grade_b: 0.30
        grade_c: 0.50
        grade_d: 1.00
        grade_e: 1.50
      corporates:
        aaa_to_aa_minus: 0.20
        a_plus_to_a_minus: 0.50
        bbb_plus_to_bbb_minus: 0.75
        bb_plus_to_b_minus: 1.00
        below_b_minus: 1.50
        unrated: 1.00
        sme_threshold_myr: 5000000
      retail:
        regulatory_retail: 0.75
        residential_mortgage:
          first_home_lte_80_ltv: 0.20
          first_home_gt_80_lte_90_ltv: 0.25
          third_home_onwards: 0.35
        personal_financing: 0.75
      islamic_banking:
        bba_murabaha: "same as equivalent conventional"
        diminishing_musharakah: "same as mortgage equivalent"
        tawarruq: "same as personal finance equivalent"
        note: "Islamic products risk-weighted by economic substance"
  irb_approach:
    pd_floor_bps: 3
    lgd_floors:
      senior_unsecured: 0.25
      subordinated: 0.50
    lgd_supervisory:
      senior_unsecured: 0.45
      subordinated: 0.75
      secured_financial_collateral: 0.0
      secured_receivables: 0.20
      secured_commercial_real_estate: 0.20
      secured_residential_real_estate: 0.20
      secured_other_collateral: 0.25
    maturity_default_years: 2.5
    maturity_min_years: 1.0
    maturity_max_years: 5.0
    asset_correlation:
      corporate:
        rho_min: 0.12
        rho_max: 0.24
      retail_mortgage:
        rho: 0.15
      retail_revolving:
        rho: 0.04
      retail_other:
        rho_min: 0.03
        rho_max: 0.16
    scaling_factor: 1.06

output_floor:
  enabled: true
  final_pct: 0.725
  phase_in_start: "2025-01-01"
  phase_in:
    "2025-01-01": 0.50
    "2026-01-01": 0.55
    "2027-01-01": 0.60
    "2028-01-01": 0.65
    "2029-01-01": 0.70
    "2030-01-01": 0.725

default_definition:
  dpd_threshold: 90
  unlikeliness_to_pay: true
  materiality_threshold_absolute_myr: 500
  materiality_threshold_relative: 0.01
  cure_period_months: 3
  bnm_classification:
    performing: "Current and special mention"
    non_performing:
      substandard: "DPD 90-180"
      doubtful: "DPD 180-360"
      bad: "DPD >360 or irrecoverable"
  rescheduled_restructured:
    observation_period_months: 6
    note: "R&R loans require 6-month observation before upgrade"

capital_requirements:
  minimum_cet1_pct: 0.045
  minimum_tier1_pct: 0.06
  minimum_total_capital_pct: 0.08
  capital_conservation_buffer_pct: 0.025
  countercyclical_buffer_pct: 0.0
  dsib_surcharge:
    enabled: true
    range:
      min: 0.005
      max: 0.02
    applicable_banks:
      - Maybank
      - CIMB
      - Public Bank
      - RHB Bank
      - Hong Leong Bank
      - AmBank

leverage_ratio:
  minimum_pct: 0.03

cva_risk:
  approaches: [BA-CVA, SA-CVA]
  exemptions:
    - sovereigns
    - central_banks
    - multilateral_development_banks

reporting:
  frequency: quarterly
  currency: MYR
  bnm_returns:
    - Capital Adequacy Framework Return
    - Credit Risk Return
    - Basel III Liquidity Returns
  pillar3_disclosure: semi_annual
  dual_reporting:
    conventional: true
    islamic: true
    note: "Malaysian banks with Islamic windows must report separately"
