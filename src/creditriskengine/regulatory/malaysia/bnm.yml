# Malaysia BNM - Bank Negara Malaysia
jurisdiction: malaysia
regulator: Bank Negara Malaysia (BNM)
framework: Basel III (Capital Adequacy Framework)
effective_date: "2024-01-01"

credit_risk:
  approaches_permitted: [SA, FIRB, AIRB]
  pd_floor_bps: 3
  lgd_supervisory:
    senior_unsecured: 0.45
    subordinated: 0.75
  maturity_default_years: 2.5

output_floor:
  enabled: true
  final_pct: 0.725
  phase_in_start: "2024-01-01"

default_definition:
  dpd_threshold: 90
  materiality_threshold_absolute_myr: 1000

capital_requirements:
  minimum_cet1_pct: 0.045
  minimum_tier1_pct: 0.06
  minimum_total_capital_pct: 0.08
  capital_conservation_buffer_pct: 0.025

leverage_ratio:
  minimum_pct: 0.03

reporting:
  frequency: quarterly
  currency: MYR
