# China NFRA - National Financial Regulatory Administration
# (formerly CBIRC) Basel III implementation under NFRA oversight

jurisdiction: China
regulator: National Financial Regulatory Administration (NFRA)
framework: Basel III (NFRA / Capital Rules for Commercial Banks)
effective_date: "2024-01-01"
document_reference: Capital Rules for Commercial Banks (Provisional), revised 2023

credit_risk:
  approaches_permitted: [SA, FIRB, AIRB]
  note: "A-IRB permitted only for approved large commercial banks"
  standardised_approach:
    risk_weights:
      sovereigns:
        china_central_government_cny: 0.0
        china_policy_banks: 0.0
        aaa_to_aa_minus: 0.0
        a_plus_to_a_minus: 0.20
        bbb_plus_to_bbb_minus: 0.50
        bb_plus_to_b_minus: 1.00
        below_b_minus: 1.50
        unrated: 1.00
      banks:
        china_commercial_banks:
          grade_a: 0.25
          grade_b: 0.30
          grade_c: 0.50
          grade_d: 1.00
          grade_e: 1.50
      corporates:
        aaa_to_aa_minus: 0.20
        a_plus_to_a_minus: 0.50
        bbb_plus_to_bbb_minus: 0.75
        bb_plus_to_b_minus: 1.00
        below_b_minus: 1.50
        unrated: 1.00
        sme_threshold_cny: 5000000
      retail:
        regulatory_retail: 0.75
        residential_mortgage_first_home:
          lte_60_ltv: 0.20
          gt_60_lte_80_ltv: 0.25
          gt_80_lte_100_ltv: 0.30
        residential_mortgage_second_home:
          lte_60_ltv: 0.30
          gt_60_lte_80_ltv: 0.40
      local_government_financing_vehicles:
        risk_weight: 1.00
        note: "LGFV exposures treated as corporate unless government-guaranteed"
  irb_approach:
    pd_floor_bps: 3
    lgd_floors:
      senior_unsecured: 0.25
      subordinated: 0.50
    lgd_supervisory:
      senior_unsecured: 0.45
      subordinated: 0.75
      secured_financial_collateral: 0.0
      secured_receivables: 0.20
      secured_commercial_real_estate: 0.20
      secured_residential_real_estate: 0.20
      secured_other_collateral: 0.25
    maturity_default_years: 2.5
    maturity_min_years: 1.0
    maturity_max_years: 5.0
    asset_correlation:
      corporate:
        rho_min: 0.12
        rho_max: 0.24
      retail_mortgage:
        rho: 0.15
      retail_revolving:
        rho: 0.04
    scaling_factor: 1.06

output_floor:
  enabled: true
  final_pct: 0.725
  phase_in_start: "2025-01-01"
  phase_in:
    "2025-01-01": 0.50
    "2026-01-01": 0.55
    "2027-01-01": 0.60
    "2028-01-01": 0.65
    "2029-01-01": 0.70
    "2030-01-01": 0.725

default_definition:
  dpd_threshold: 90
  unlikeliness_to_pay: true
  materiality_threshold_absolute_cny: 1000
  materiality_threshold_relative: 0.01
  five_tier_classification:
    pass: "Normal performance"
    special_mention: "Potential issues, DPD 1-90"
    substandard: "DPD 90-360 or impaired"
    doubtful: "DPD 360-720 or severe impairment"
    loss: "DPD >720 or unrecoverable"
  cure_period_months: 6

capital_requirements:
  minimum_cet1_pct: 0.05
  minimum_tier1_pct: 0.06
  minimum_total_capital_pct: 0.08
  capital_conservation_buffer_pct: 0.025
  countercyclical_buffer_pct: 0.0
  gsib_surcharge:
    enabled: true
    applicable_banks:
      - ICBC
      - CCB
      - ABC
      - BOC
    range:
      min: 0.01
      max: 0.025
  dsib_surcharge:
    enabled: true
    range:
      min: 0.0025
      max: 0.01

leverage_ratio:
  minimum_pct: 0.04
  note: "NFRA requires 4% leverage ratio for systemically important banks"

cva_risk:
  approaches: [BA-CVA, SA-CVA]
  exemptions:
    - sovereigns
    - central_banks
    - policy_banks

reporting:
  frequency: quarterly
  currency: CNY
  nfra_returns:
    - G4B-1 Capital Adequacy
    - G4B-2 Credit Risk
    - G4B-3 Market Risk
  pillar3_disclosure: semi_annual
