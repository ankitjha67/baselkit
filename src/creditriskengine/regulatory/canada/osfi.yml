# Canada OSFI - Office of the Superintendent of Financial Institutions
# Basel III reforms under OSFI Capital Adequacy Requirements (CAR)

jurisdiction: Canada
regulator: Office of the Superintendent of Financial Institutions (OSFI)
framework: Basel III Final Reforms (OSFI CAR)
effective_date: "2024-04-01"
document_reference: OSFI CAR Guideline A-1, revised Q2 2024

credit_risk:
  approaches_permitted: [SA, FIRB, AIRB]
  standardised_approach:
    risk_weights:
      sovereigns:
        aaa_to_aa_minus: 0.0
        a_plus_to_a_minus: 0.20
        bbb_plus_to_bbb_minus: 0.50
        bb_plus_to_b_minus: 1.00
        below_b_minus: 1.50
        unrated: 1.00
        canada_government_cad: 0.0
        provincial_government: 0.0
      banks:
        grade_a: 0.20
        grade_b: 0.30
        grade_c: 0.50
        grade_d: 1.00
        grade_e: 1.50
      corporates:
        aaa_to_aa_minus: 0.20
        a_plus_to_a_minus: 0.50
        bbb_plus_to_bbb_minus: 0.75
        bb_plus_to_b_minus: 1.00
        below_b_minus: 1.50
        unrated: 1.00
      retail:
        regulatory_retail: 0.75
        residential_mortgage:
          insured: 0.05
          uninsured_lte_65_ltv: 0.20
          uninsured_gt_65_lte_75_ltv: 0.25
          uninsured_gt_75_lte_80_ltv: 0.30
          uninsured_gt_80_lte_90_ltv: 0.40
          uninsured_gt_90_lte_100_ltv: 0.50
      commercial_real_estate:
        income_producing_lte_60_ltv: 0.70
        income_producing_gt_60_lte_80_ltv: 0.90
        non_income_producing: 1.50
  irb_approach:
    pd_floor_bps: 3
    lgd_floors:
      senior_unsecured: 0.25
      subordinated: 0.50
    lgd_supervisory:
      senior_unsecured: 0.45
      subordinated: 0.75
      secured_financial_collateral: 0.0
      secured_receivables: 0.20
      secured_commercial_real_estate: 0.20
      secured_residential_real_estate: 0.20
      secured_other_collateral: 0.25
    maturity_default_years: 2.5
    maturity_min_years: 1.0
    maturity_max_years: 5.0
    asset_correlation:
      corporate:
        rho_min: 0.12
        rho_max: 0.24
      retail_mortgage:
        rho: 0.15
      retail_revolving:
        rho: 0.04
      retail_other:
        rho_min: 0.03
        rho_max: 0.16
    scaling_factor: 1.06

output_floor:
  enabled: true
  final_pct: 0.725
  phase_in_start: "2024-04-01"
  note: "OSFI began output floor phase-in Q2 2024"
  phase_in:
    "2024-04-01": 0.55
    "2025-04-01": 0.60
    "2026-04-01": 0.65
    "2027-04-01": 0.70
    "2028-04-01": 0.725

default_definition:
  dpd_threshold: 90
  unlikeliness_to_pay: true
  materiality_threshold_absolute_cad: 500
  materiality_threshold_relative: 0.01
  cure_period_months: 3
  impaired_loan_classification: true

capital_requirements:
  minimum_cet1_pct: 0.045
  minimum_tier1_pct: 0.06
  minimum_total_capital_pct: 0.08
  capital_conservation_buffer_pct: 0.025
  countercyclical_buffer_pct: 0.0
  dsib_surcharge_pct: 0.01
  dsib_applicable_banks:
    - RBC
    - TD
    - BMO
    - Scotiabank
    - CIBC
    - National Bank
  domestic_stability_buffer:
    enabled: true
    current_pct: 0.035
    range:
      min: 0.0
      max: 0.04
    note: "OSFI sets DSB based on systemic vulnerabilities"

leverage_ratio:
  minimum_pct: 0.03
  dsib_buffer: true

cva_risk:
  approaches: [BA-CVA, SA-CVA]
  exemptions:
    - sovereigns
    - central_banks
    - multilateral_development_banks

reporting:
  frequency: quarterly
  currency: CAD
  fiscal_year_end: "October 31"
  osfi_returns:
    - BCAR
    - Credit Risk RWA Return
    - Leverage Ratio Return
  pillar3_disclosure: quarterly
