# South Africa SARB - South African Reserve Bank
# Basel III implementation under Prudential Authority (PA) of SARB

jurisdiction: South Africa
regulator: South African Reserve Bank (SARB) - Prudential Authority
framework: Basel III (Banks Act Regulations D)
effective_date: "2025-01-01"
document_reference: Regulations relating to Banks (Directive D), revised 2024

credit_risk:
  approaches_permitted: [SA, FIRB, AIRB]
  standardised_approach:
    risk_weights:
      sovereigns:
        aaa_to_aa_minus: 0.0
        a_plus_to_a_minus: 0.20
        bbb_plus_to_bbb_minus: 0.50
        bb_plus_to_b_minus: 1.00
        below_b_minus: 1.50
        unrated: 1.00
        south_africa_government_zar: 0.0
      banks:
        grade_a: 0.20
        grade_b: 0.30
        grade_c: 0.50
        grade_d: 1.00
        grade_e: 1.50
      corporates:
        aaa_to_aa_minus: 0.20
        a_plus_to_a_minus: 0.50
        bbb_plus_to_bbb_minus: 0.75
        bb_plus_to_b_minus: 1.00
        below_b_minus: 1.50
        unrated: 1.00
      retail:
        regulatory_retail: 0.75
        residential_mortgage_lte_80: 0.20
        residential_mortgage_gt_80_lte_90: 0.25
        residential_mortgage_gt_90_lte_100: 0.30
      sme:
        sme_threshold_zar: 7500000
        sme_retail_treatment: true
  irb_approach:
    pd_floor_bps: 5
    lgd_floors:
      senior_unsecured: 0.25
      subordinated: 0.50
    lgd_supervisory:
      senior_unsecured: 0.45
      subordinated: 0.75
      secured_financial_collateral: 0.0
      secured_receivables: 0.20
      secured_commercial_real_estate: 0.20
      secured_residential_real_estate: 0.20
      secured_other_collateral: 0.25
    maturity_default_years: 2.5
    maturity_min_years: 1.0
    maturity_max_years: 5.0
    asset_correlation:
      corporate:
        rho_min: 0.12
        rho_max: 0.24
      retail_mortgage:
        rho: 0.15
      retail_revolving:
        rho: 0.04
      retail_other:
        rho_min: 0.03
        rho_max: 0.16
    scaling_factor: 1.06

output_floor:
  enabled: true
  final_pct: 0.725
  phase_in_start: "2025-01-01"
  phase_in:
    "2025-01-01": 0.50
    "2026-01-01": 0.55
    "2027-01-01": 0.60
    "2028-01-01": 0.65
    "2029-01-01": 0.70
    "2030-01-01": 0.725

default_definition:
  dpd_threshold: 90
  unlikeliness_to_pay: true
  materiality_threshold_absolute_zar: 500
  materiality_threshold_relative: 0.01
  cure_period_months: 3
  nca_influence:
    national_credit_act_applies: true
    debt_counselling_impact: true

capital_requirements:
  minimum_cet1_pct: 0.045
  minimum_tier1_pct: 0.06
  minimum_total_capital_pct: 0.08
  capital_conservation_buffer_pct: 0.025
  countercyclical_buffer_pct: 0.0
  dsib_surcharge:
    enabled: true
    range:
      min: 0.005
      max: 0.025
    applicable_banks:
      - Standard Bank
      - FirstRand
      - ABSA
      - Nedbank
      - Investec
  pillar2a:
    set_by: Prudential Authority
    bank_specific: true

leverage_ratio:
  minimum_pct: 0.04
  note: "SARB requires 4% leverage ratio"

cva_risk:
  approaches: [BA-CVA, SA-CVA]
  exemptions:
    - sovereigns
    - central_banks

reporting:
  frequency: quarterly
  currency: ZAR
  sarb_returns:
    - BA 700 Capital Adequacy
    - BA 200 Credit Risk
    - BA 300 Market Risk
  pillar3_disclosure: semi_annual
