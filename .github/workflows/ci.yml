name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  dco-check:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: DCO Check
        run: |
          base_sha=${{ github.event.pull_request.base.sha }}
          head_sha=${{ github.event.pull_request.head.sha }}
          missing=""
          for sha in $(git rev-list "$base_sha".."$head_sha"); do
            if ! git log -1 --format='%B' "$sha" | grep -qi 'Signed-off-by:'; then
              missing="$missing $sha"
            fi
          done
          if [ -n "$missing" ]; then
            echo "::error::The following commits are missing a DCO Signed-off-by line:$missing"
            echo "Fix with: git commit --amend -s"
            exit 1
          fi
          echo "All commits have DCO sign-off."

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint with ruff
        run: ruff check src/ tests/
      - name: Type check with mypy
        run: python -m mypy src/creditriskengine/
      - name: Test with pytest
        run: pytest
